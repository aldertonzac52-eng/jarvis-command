<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#04070f" />
<title>3 Varcoe St, Shepparton — Room Application</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet" />
<style>
  :root{--bg:#04070f;--glass:rgba(16,28,52,.55);--line:rgba(86,140,210,.22);--txt:#eaf2ff;--muted:#9eb4d8;--cyan:#36e0ff;--cyan-dim:#2a93b3;--green:#33e6a0}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;min-height:100%}
  body{background:radial-gradient(1200px 600px at 50% -10%,rgba(40,120,180,.20),transparent 60%),linear-gradient(180deg,#04070f,#060b18 60%,#04070f);color:var(--txt);font-family:"Inter",-apple-system,sans-serif;font-size:15px;-webkit-font-smoothing:antialiased;padding:env(safe-area-inset-top) 16px 40px}
  .wrap{max-width:560px;margin:0 auto}
  .top{text-align:center;padding:26px 0 6px}
  .mk{font-family:"Space Grotesk",sans-serif;font-weight:700;letter-spacing:.3em;color:var(--cyan);font-size:13px}
  h1{font-size:22px;margin:14px 0 2px}
  .sub{color:var(--muted);font-size:13px;margin-bottom:16px}
  img.house{width:100%;border-radius:16px;display:block;margin:6px 0 16px;box-shadow:0 10px 34px rgba(0,0,0,.5)}
  .card{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--line);border-radius:18px;padding:18px}
  .opts{display:grid;gap:9px;margin:4px 0 4px}
  .opt{border:1px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;transition:.15s;display:block}
  .opt:hover{border-color:var(--cyan-dim)}
  .opt.sel{border-color:var(--cyan);background:rgba(54,224,255,.08)}
  .opt input{display:none}
  .opt .t{font-weight:700}
  .opt .d{font-size:12px;color:var(--muted);margin-top:2px}
  label.f{display:block;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin:14px 0 4px}
  input,textarea{width:100%;background:rgba(54,224,255,.05);border:1px solid var(--line);border-radius:10px;padding:11px 12px;color:var(--txt);font-family:inherit;font-size:15px}
  input:focus,textarea:focus{outline:none;border-color:var(--cyan-dim)}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .hp{position:absolute;left:-9999px;opacity:0}
  button.go{width:100%;margin-top:18px;background:var(--cyan);color:#04121a;border:none;border-radius:12px;padding:14px;font-size:16px;font-weight:800;cursor:pointer}
  button.go:disabled{opacity:.6}
  .note{font-size:11px;color:var(--muted);margin-top:12px;text-align:center;line-height:1.5}
  .done{text-align:center;padding:40px 10px}
  .done .big{font-size:44px}
  .err{color:#ff6b8a;font-size:13px;margin-top:10px;text-align:center}
</style>
</head>
<body>
<div class="wrap">
  <div class="top"><span class="mk">3 VARCOE ST · SHEPPARTON</span><h1>Room Application</h1><div class="sub">Fill this out and I'll be in touch. Takes a minute.</div></div>
  <img class="house" src="house.jpg" alt="3 Varcoe St, Shepparton" onerror="this.style.display='none'" />
  <div class="card" id="form">
    <label class="f">Which option suits you?</label>
    <div class="opts" id="opts">
      <label class="opt sel"><input type="radio" name="option" value="allin" checked><div class="t">All-inclusive — $300/week</div><div class="d">Rent + all bills (power, gas, water, internet). One flat payment.</div></label>
      <label class="opt"><input type="radio" name="option" value="rentonly"><div class="t">Rent only — $233/week</div><div class="d">You split the bills with the house.</div></label>
      <label class="opt"><input type="radio" name="option" value="couple_allin"><div class="t">Couple, all-inclusive — $450/week</div><div class="d">Two of you sharing a room, everything covered.</div></label>
      <label class="opt"><input type="radio" name="option" value="couple_rentonly"><div class="t">Couple, rent only — $350/week</div><div class="d">Two of you, you split the bills.</div></label>
    </div>
    <label class="f">Your name</label><input id="name" autocomplete="name" />
    <div class="row"><div><label class="f">Email</label><input id="email" type="email" autocomplete="email" /></div><div><label class="f">Mobile</label><input id="mobile" type="tel" autocomplete="tel" /></div></div>
    <div class="row"><div><label class="f">Move-in date</label><input id="move_in" type="date" /></div><div><label class="f">Move-out (if known)</label><input id="leave_on" type="date" /></div></div>
    <div class="row"><div><label class="f">Emergency contact</label><input id="emergency_name" /></div><div><label class="f">Their phone</label><input id="emergency_phone" type="tel" /></div></div>
    <label class="f">Anything else I should know?</label><textarea id="note" rows="3"></textarea>
    <input class="hp" id="website" tabindex="-1" autocomplete="off" placeholder="Leave blank" />
    <button class="go" id="go" onclick="submit()">Send application</button>
    <div class="err" id="err"></div>
    <div class="note">Your details go straight to Zac. No spam, no third parties.</div>
  </div>
  <div class="card done" id="done" style="display:none"><div class="big">✅</div><h1>Thanks!</h1><div class="sub">Your application's in — Zac will be in touch shortly.</div></div>
</div>
<script>
const INTAKE="https://liqfekbcoopnelrnkkox.supabase.co/functions/v1/rent-intake";
document.querySelectorAll('.opt').forEach(function(o){o.addEventListener('click',function(){document.querySelectorAll('.opt').forEach(function(x){x.classList.remove('sel');});o.classList.add('sel');});});
function val(id){var e=document.getElementById(id);return e?e.value.trim():"";}
function submit(){
  var err=document.getElementById('err');err.textContent="";
  var name=val('name'),email=val('email'),mobile=val('mobile');
  if(!name){err.textContent="Please add your name.";return;}
  if(!email&&!mobile){err.textContent="Please add an email or mobile so Zac can reach you.";return;}
  var opt=(document.querySelector('input[name=option]:checked')||{}).value||"allin";
  var body={name:name,email:email,mobile:mobile,option:opt,move_in:val('move_in'),leave_on:val('leave_on'),emergency_name:val('emergency_name'),emergency_phone:val('emergency_phone'),note:val('note'),website:val('website')};
  var go=document.getElementById('go');go.disabled=true;go.textContent="Sending…";
  fetch(INTAKE,{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(body)})
   .then(function(r){return r.json();}).then(function(j){
     if(j&&j.ok){document.getElementById('form').style.display='none';document.getElementById('done').style.display='block';window.scrollTo(0,0);}
     else{err.textContent=(j&&j.error)||"Something went wrong, please try again.";go.disabled=false;go.textContent="Send application";}
   }).catch(function(){err.textContent="Couldn't send — check your connection and try again.";go.disabled=false;go.textContent="Send application";});
}
</script>
</body>
</html>
