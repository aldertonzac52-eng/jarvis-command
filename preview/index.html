<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>JARVIS · Design Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config={darkMode:'class',theme:{extend:{
  colors:{accent:'#36e0ff',pos:'#33e6a0',neg:'#ff5d72',amber:'#ffc24b',
    ink:'#e8f0ff',mute:'#93a6c8',panel:'rgba(17,27,48,.55)',line:'rgba(90,140,210,.16)'},
  fontFamily:{sans:['Inter','system-ui','sans-serif'],grotesk:['Space Grotesk','sans-serif']},
  borderRadius:{xl2:'1.15rem'}
}}}
</script>
<script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1/dist/apexcharts.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body{margin:0;background:#05080f;color:#e8f0ff;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  body{background:
    radial-gradient(1100px 560px at 50% -8%,rgba(40,120,180,.22),transparent 60%),
    radial-gradient(820px 460px at 100% 110%,rgba(54,224,255,.09),transparent 55%),
    linear-gradient(180deg,#05080f,#070c19 60%,#05080f);min-height:100vh}
  .glass{background:rgba(17,27,48,.55);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
  .ring{animation:spin 18s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  ::-webkit-scrollbar{height:6px;width:6px}::-webkit-scrollbar-thumb{background:rgba(90,140,210,.3);border-radius:9px}
  .fade{animation:fade .5s ease both}@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const {useState,useEffect,useRef}=React;
const LOOKUP="https://liqfekbcoopnelrnkkox.supabase.co/functions/v1/jarvis-lookup";

// representative book (design preview — live prices, sample units)
const BOOK=[
  {t:"WTC.AX",n:"WiseTech Global",u:665,avg:39.09,ccy:"AUD",kind:"Share"},
  {t:"NOW",n:"ServiceNow",u:73,avg:93.61,ccy:"USD",kind:"Share"},
  {t:"CSL.AX",n:"CSL",u:60,avg:110.0,ccy:"AUD",kind:"Share"},
  {t:"MSFT",n:"Microsoft",u:12,avg:410.0,ccy:"USD",kind:"Share"},
  {t:"VOO",n:"Vanguard S&P 500",u:9,avg:430.0,ccy:"USD",kind:"ETF"}
];
const WATCH=["MU","IONQ","PV1.AX"];

const fmt=(n,ccy)=> (ccy==="USD"?"US$":"A$")+Number(n).toLocaleString("en-AU",{minimumFractionDigits:2,maximumFractionDigits:(Math.abs(n)<1?4:2)});
const money=n=> "A$"+Number(Math.round(n)).toLocaleString("en-AU");
const pct=n=> (n>=0?"+":"")+Number(n).toFixed(2)+"%";
const cls=n=> n>=0?"text-pos":"text-neg";

function Spark({data,w=104,h=30}){
  if(!data||data.length<2) return null;
  const min=Math.min(...data),max=Math.max(...data),rng=(max-min)||1,pad=2;
  const pts=data.map((v,i)=>[pad+(i/(data.length-1))*(w-2*pad),h-pad-((v-min)/rng)*(h-2*pad)]);
  const line=pts.map((p,i)=>(i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1)).join(" ");
  const up=data[data.length-1]>=data[0], col=up?"#33e6a0":"#ff5d72";
  return <svg width={w} height={h} className="overflow-visible"><path d={line} fill="none" stroke={col} strokeWidth="1.6" strokeLinejoin="round"/><circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="2" fill={col}/></svg>;
}

function Apex({options,className}){
  const ref=useRef(null),chart=useRef(null);
  useEffect(()=>{ if(!ref.current||typeof ApexCharts==="undefined")return;
    if(chart.current){try{chart.current.updateOptions(options,false,false,false);}catch(e){}}
    else{chart.current=new ApexCharts(ref.current,options);chart.current.render();}
  },[JSON.stringify(options)]);
  useEffect(()=>()=>{if(chart.current){try{chart.current.destroy();}catch(e){}}},[]);
  return <div ref={ref} className={className}/>;
}

function Card({title,sub,icon,children,className=""}){
  return <div className={"glass border border-line rounded-xl2 p-4 fade "+className}>
    <div className="flex items-center gap-2 mb-3">
      {icon&&<i data-lucide={icon} className="w-4 h-4 text-accent/80"></i>}
      <h3 className="text-[13px] font-semibold tracking-wide text-ink">{title}</h3>
      {sub&&<span className="ml-auto text-[10px] uppercase tracking-widest text-mute">{sub}</span>}
    </div>
    {children}
  </div>;
}

function Reactor(){
  return <div className="relative w-[120px] h-[120px] grid place-items-center" style={{filter:"drop-shadow(0 0 26px rgba(54,224,255,.45))"}}>
    <div className="absolute inset-0 rounded-full border border-accent/40 ring"></div>
    <div className="absolute inset-[14px] rounded-full border border-dashed border-accent/25 ring" style={{animationDirection:"reverse"}}></div>
    <div className="w-1/2 h-1/2 rounded-full" style={{background:"radial-gradient(circle at 35% 28%,#fff 0%,#c6f5ff 13%,#3fe2ff 40%,#0c6f90 72%,#04232f 100%)",boxShadow:"0 0 24px rgba(54,224,255,.6),inset -5px -7px 16px rgba(0,16,26,.65),inset 5px 6px 15px rgba(255,255,255,.5)"}}></div>
  </div>;
}

function App(){
  const [px,setPx]=useState({});
  const [sparks,setSparks]=useState({});
  const [fx,setFx]=useState(0.66);
  const [clock,setClock]=useState("");
  const [loaded,setLoaded]=useState(false);

  useEffect(()=>{
    const all=[...BOOK.map(b=>b.t),...WATCH,"AUDUSD=X"];
    fetch(LOOKUP+"?tickers="+encodeURIComponent(all.join(","))).then(r=>r.json()).then(j=>{
      const m={};(j.rows||[]).forEach(x=>m[x.sym]={price:x.price,pct:x.pct});
      if(m["AUDUSD=X"]&&m["AUDUSD=X"].price) setFx(m["AUDUSD=X"].price);
      setPx(m); setLoaded(true);
    });
    fetch(LOOKUP+"?sparks="+encodeURIComponent([...BOOK.map(b=>b.t),...WATCH].join(","))).then(r=>r.json()).then(j=>{
      const m={};(j.rows||[]).forEach(x=>{if(x.spark&&x.spark.length>2)m[x.sym]=x.spark;});setSparks(m);
    });
  },[]);
  useEffect(()=>{const t=setInterval(()=>setClock(new Date().toLocaleTimeString("en-AU",{hour:"2-digit",minute:"2-digit"})),1000);return()=>clearInterval(t);},[]);
  useEffect(()=>{if(window.lucide)lucide.createIcons();});

  const rows=BOOK.map(b=>{
    const p=px[b.t]&&px[b.t].price!=null?px[b.t].price:b.avg;
    const day=px[b.t]?px[b.t].pct:null;
    const val=b.ccy==="USD"?b.u*p/fx:b.u*p;
    const cost=b.ccy==="USD"?b.u*b.avg/fx:b.u*b.avg;
    return {...b,price:p,day,val,cost,pl:val-cost,plPct:(val-cost)/cost*100,spark:sparks[b.t]};
  });
  const tv=rows.reduce((a,r)=>a+r.val,0), tc=rows.reduce((a,r)=>a+r.cost,0);
  const plPct=tc?(tv-tc)/tc*100:0;

  // net-worth curve from sparks (fallback flat)
  let nw=[]; const withSpark=rows.filter(r=>r.spark&&r.spark.length>2);
  if(withSpark.length){
    const L=Math.min(...withSpark.map(r=>r.spark.length));
    for(let i=0;i<L;i++){let s=0;withSpark.forEach(r=>{const c=r.spark[r.spark.length-L+i];s+=r.ccy==="USD"?r.u*c/fx:r.u*c;});nw.push(s);}
    const scale=tv/nw[nw.length-1]; nw=nw.map(v=>Math.round(v*scale));
  }
  const nwUp=nw.length&&nw[nw.length-1]>=nw[0], nwCol=nwUp?"#33e6a0":"#ff5d72";
  const nwChg=nw.length?nw[nw.length-1]-nw[0]:0, nwPc=nw.length&&nw[0]?nwChg/nw[0]*100:0;

  const pal=["#36e0ff","#33e6a0","#ffc24b","#ff5d72","#8b7dff"];
  const hr=new Date().getHours(), tod=hr<12?"Good morning":hr<18?"Good afternoon":"Good evening";

  return <div className="max-w-6xl mx-auto px-4 sm:px-6 py-5">
    {/* top bar */}
    <div className="flex items-center gap-3 mb-6">
      <span className="font-grotesk font-bold tracking-[.3em] text-ink text-sm">JARVIS</span>
      <span className="text-[11px] px-2 py-0.5 rounded-full border border-accent/40 text-accent tracking-wide">DESIGN PREVIEW</span>
      <div className="flex-1"></div>
      <span className="flex items-center gap-1.5 text-[11px] text-mute"><span className="w-1.5 h-1.5 rounded-full bg-pos" style={{boxShadow:"0 0 8px #33e6a0"}}></span>live</span>
      <span className="text-[11px] text-mute tabular-nums">{clock}</span>
    </div>

    {/* hero */}
    <div className="grid md:grid-cols-[auto,1fr] gap-5 items-center mb-6">
      <div className="flex justify-center"><Reactor/></div>
      <div className="glass border border-line rounded-xl2 p-5 fade">
        <div className="text-[12px] uppercase tracking-[.2em] text-accent mb-1">{tod}, Zac</div>
        <div className="flex items-end gap-3 flex-wrap">
          <div className="font-grotesk text-4xl font-bold text-ink tabular-nums">{loaded?money(tv):"—"}</div>
          <div className={"text-sm font-semibold mb-1 "+cls(plPct)}>{loaded?(plPct>=0?"+":"")+money(tv-tc)+" ("+pct(plPct)+")":""}</div>
        </div>
        <div className="text-[12px] text-mute mt-0.5">Total portfolio · cost basis {money(tc)} · AUD/USD {fx.toFixed(4)}</div>
        {nw.length>1&&<div className="mt-2">
          <div className="flex justify-between text-[10px] uppercase tracking-widest text-mute mb-1"><span>Net worth · {nw.length} days</span><span style={{color:nwCol}} className="font-bold">{(nwChg>=0?"+":"")+money(nwChg)} ({(nwPc>=0?"+":"")+nwPc.toFixed(1)}%)</span></div>
          <Apex className="-mb-2" options={{
            chart:{type:"area",height:120,sparkline:{enabled:true},animations:{speed:500},fontFamily:"Inter"},
            series:[{name:"Net worth",data:nw}], colors:[nwCol], stroke:{curve:"smooth",width:2.4},
            fill:{type:"gradient",gradient:{opacityFrom:.35,opacityTo:0,stops:[0,100]}},
            tooltip:{theme:"dark",x:{show:false},y:{formatter:v=>money(v)},marker:{show:false}}
          }}/>
        </div>}
      </div>
    </div>

    {/* grid */}
    <div className="grid md:grid-cols-2 gap-5">
      <Card title="Holdings" sub="live" icon="wallet">
        <div className="divide-y divide-line">
          {rows.map((r,i)=><div key={i} className="flex items-center gap-3 py-2.5">
            <div className="min-w-0">
              <div className="font-grotesk font-bold text-ink text-[14px] flex items-center gap-1.5">{r.t.replace('.AX','')}
                <span className="text-[9px] px-1.5 py-0.5 rounded-md border border-line text-mute font-sans">{r.kind}</span></div>
              <div className="text-[11px] text-mute truncate">{r.n} · {r.u} @ {fmt(r.avg,r.ccy)}</div>
            </div>
            <div className="flex-1"></div>
            <Spark data={r.spark} w={84} h={26}/>
            <div className="text-right">
              <div className="text-ink text-[13px] tabular-nums">{money(r.val)}</div>
              <div className={"text-[11px] tabular-nums "+cls(r.pl)}>{(r.pl>=0?"+":"")+money(r.pl)} · {pct(r.plPct)}</div>
            </div>
          </div>)}
        </div>
      </Card>

      <Card title="Allocation" sub="mix" icon="pie-chart">
        {loaded?<Apex options={{
          chart:{type:"donut",height:250,fontFamily:"Inter",animations:{speed:500}},
          series:rows.map(r=>Math.round(r.val)), labels:rows.map(r=>r.t.replace('.AX','')), colors:pal,
          stroke:{width:1,colors:["#05080f"]},
          legend:{position:"bottom",labels:{colors:"#93a6c8"},fontSize:"11px"},
          dataLabels:{enabled:true,formatter:v=>v>=8?Math.round(v)+"%":"",style:{fontSize:"10px"}},
          plotOptions:{pie:{donut:{size:"64%",labels:{show:true,value:{color:"#e8f0ff",fontSize:"15px",formatter:v=>money(Number(v))},total:{show:true,label:"Total",color:"#93a6c8",fontSize:"11px",formatter:()=>money(tv)}}}}},
          tooltip:{theme:"dark",y:{formatter:v=>money(v)+" ("+Math.round(v/tv*100)+"%)"}}
        }}/>:<div className="h-[250px] grid place-items-center text-mute text-sm">Loading…</div>}
      </Card>

      <Card title="Watchlist" sub="live" icon="eye">
        <div className="divide-y divide-line">
          {WATCH.map((t,i)=>{const p=px[t];return <div key={i} className="flex items-center gap-3 py-2.5">
            <div className="font-grotesk font-bold text-ink text-[14px] min-w-[54px]">{t.replace('.AX','')}</div>
            <Spark data={sparks[t]} w={84} h={26}/>
            <div className="flex-1"></div>
            <div className="text-right">
              <div className="text-ink text-[13px] tabular-nums">{p&&p.price!=null?fmt(p.price, t==="PV1.AX"?"AUD":(t==="MU"||t==="IONQ"?"USD":"AUD")):"—"}</div>
              <div className={"text-[11px] tabular-nums "+(p&&p.pct>=0?"text-pos":"text-neg")}>{p&&p.pct!=null?pct(p.pct):""}</div>
            </div>
          </div>;})}
        </div>
      </Card>

      <Card title="Today" sub="1w · 1m · YTD" icon="trending-up">
        <Apex options={{
          chart:{type:"bar",height:250,toolbar:{show:false},fontFamily:"Inter",animations:{speed:500}},
          series:[{name:"You",data:[2.1,4.8,plPct]},{name:"ASX200",data:[0.9,2.2,7.4]},{name:"S&P500",data:[1.4,3.1,9.8]}],
          xaxis:{categories:["1 wk","1 mo","YTD"],labels:{style:{colors:["#93a6c8","#93a6c8","#93a6c8"]}},axisBorder:{show:false},axisTicks:{show:false}},
          yaxis:{labels:{style:{colors:"#93a6c8"},formatter:v=>v.toFixed(0)+"%"}},
          colors:["#36e0ff","#8aa0c6","#ffc24b"],
          plotOptions:{bar:{columnWidth:"62%",borderRadius:3}}, dataLabels:{enabled:false},
          legend:{labels:{colors:"#93a6c8"},position:"top",horizontalAlign:"right",fontSize:"11px",markers:{width:8,height:8}},
          grid:{borderColor:"rgba(90,140,210,.14)",strokeDashArray:3},
          tooltip:{theme:"dark",y:{formatter:v=>(v>=0?"+":"")+v.toFixed(2)+"%"}}
        }}/>
        <div className="text-[10px] text-mute mt-1">YTD "You" reflects live portfolio; index figures illustrative in preview.</div>
      </Card>
    </div>

    <div className="text-center text-[11px] text-mute mt-6">JARVIS design preview · live prices via your data feed · not financial advice</div>
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
